name: Docker Base

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-base.yml"
      - "docker/vget/Dockerfile"
      - "docker/vget/Dockerfile.arm64"
      - "docker/vget/entrypoint.sh"
      - "docker/vget/entrypoint-arm64.sh"
      - "docker/vget/funasr_transcriber.py"

permissions:
  contents: read
  packages: write

env:
  MODEL_BASE_TAG: sensevoicesmall-ctpunc-v1

jobs:
  docker-base-amd64:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 base by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/vget/Dockerfile
          target: model-base
          platforms: linux/amd64
          cache-from: type=gha,scope=model-base-amd64
          cache-to: type=gha,mode=max,scope=model-base-amd64
          outputs: type=image,name=ghcr.io/${{ github.repository }}-base,push-by-digest=true,name-canonical=true,push=true

  docker-base-arm64:
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 base by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/vget/Dockerfile.arm64
          target: model-base
          platforms: linux/arm64
          cache-from: type=gha,scope=model-base-arm64
          cache-to: type=gha,mode=max,scope=model-base-arm64
          outputs: type=image,name=ghcr.io/${{ github.repository }}-base,push-by-digest=true,name-canonical=true,push=true

  docker-base-manifest:
    runs-on: ubuntu-latest
    needs: [docker-base-amd64, docker-base-arm64]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push base manifest
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/${{ github.repository }}-base:${{ env.MODEL_BASE_TAG }}" \
            -t "ghcr.io/${{ github.repository }}-base:latest" \
            "ghcr.io/${{ github.repository }}-base@${{ needs.docker-base-amd64.outputs.digest }}" \
            "ghcr.io/${{ github.repository }}-base@${{ needs.docker-base-arm64.outputs.digest }}"
